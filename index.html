<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>韩语速记</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0f1117;
  color: #e8eaf0;
  font-family: -apple-system, "PingFang SC", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
  min-height: 100vh;
  padding: 0 0 60px;
}
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  height: 50px;
  background: #0f1117;
  border-bottom: 1px solid #1e2030;
  position: sticky;
  top: 0;
  z-index: 10;
}
.logo { font-size: 16px; font-weight: 700; color: #a78bfa; }
.logo span { color: #9095b0; font-size: 13px; font-weight: 400; margin-left: 6px; }
.gram-link { padding: 5px 12px; border-radius: 16px; border: 1px solid #2c2f3e; background: #1a1c24; color: #9095b0; font-size: 12px; text-decoration: none; font-family: inherit; transition: all .15s; white-space: nowrap; }
.gram-link:hover { border-color: #a78bfa; color: #a78bfa; }
.tabs { display: flex; background: #1a1c24; border: 1px solid #2c2f3e; border-radius: 20px; padding: 3px; gap: 2px; }
.tab {
  padding: 5px 18px;
  border-radius: 16px;
  border: none;
  background: transparent;
  color: #9095b0;
  font-size: 13px;
  cursor: pointer;
  font-family: inherit;
}
.tab.on { background: #7c6af7; color: #fff; }
.page { display: none; padding: 14px 16px 0; max-width: 600px; margin: 0 auto; }
.page.on { display: block; }
.levels { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; margin-bottom: 12px; }
.lv {
  padding: 5px 12px;
  background: #1a1c24;
  border: 1.5px solid #2c2f3e;
  border-radius: 20px;
  font-size: 12px;
  color: #9095b0;
  cursor: pointer;
  user-select: none;
}
.lv.on { border-color: #7c6af7; color: #a78bfa; background: rgba(124,106,247,0.1); }
.info { text-align: center; font-size: 12px; color: #5a5f7a; margin-bottom: 10px; }
.card {
  background: #1a1c24;
  border: 1px solid #2c2f3e;
  border-radius: 16px;
  padding: 26px 22px 20px;
  margin-bottom: 14px;
  text-align: center;
}
.kr { font-size: 56px; font-weight: 700; margin-bottom: 8px; letter-spacing: 0.05em; }
.ro { font-size: 17px; color: #a78bfa; margin-bottom: 5px; font-family: Menlo, "Courier New", monospace; }
.zh { font-size: 20px; color: #c0c5dd; margin-bottom: 16px; }
.letters { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 14px; }
.letter {
  background: #22242e;
  border: 1px solid #383b50;
  border-radius: 8px;
  padding: 8px 12px;
  font-size: 14px;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.letter b { color: #a78bfa; font-size: 16px; }
.letter span { color: #5a5f7a; font-size: 10px; margin-top: 2px; font-family: Menlo, "Courier New", monospace; }
.tip {
  background: #22242e;
  border-left: 3px solid #fbbf24;
  padding: 11px 13px;
  border-radius: 0 6px 6px 0;
  font-size: 13px;
  line-height: 1.6;
  text-align: left;
  color: #c0c5dd;
}
.scard {
  background: #1a1c24;
  border: 1px solid #2c2f3e;
  border-radius: 16px;
  padding: 22px 20px 18px;
  margin-bottom: 14px;
}
.scene { text-align: center; font-size: 11px; color: #5a5f7a; letter-spacing: 0.06em; margin-bottom: 10px; }
.skr { font-size: 28px; font-weight: 700; text-align: center; margin-bottom: 6px; line-height: 1.4; }
.sro { text-align: center; font-size: 13px; color: #a78bfa; font-family: Menlo, "Courier New", monospace; margin-bottom: 5px; }
.szh { text-align: center; font-size: 18px; font-weight: 600; color: #c0c5dd; margin-bottom: 16px; }
.breakdown { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
.brow {
  display: flex;
  align-items: baseline;
  gap: 8px;
  padding: 7px 10px;
  background: #22242e;
  border-radius: 8px;
  flex-wrap: wrap;
}
.bword { font-weight: 700; font-size: 15px; color: #a78bfa; min-width: 56px; }
.brole { font-size: 11px; color: #5a5f7a; font-family: Menlo, "Courier New", monospace; min-width: 36px; }
.bdef { font-size: 13px; color: #c0c5dd; }
.stip {
  background: #22242e;
  border-left: 3px solid #34d399;
  padding: 11px 13px;
  border-radius: 0 6px 6px 0;
  font-size: 13px;
  line-height: 1.6;
  color: #c0c5dd;
}
.btns { display: flex; gap: 8px; }
.btn {
  flex: 1;
  padding: 12px;
  border: none;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
}
.btn:hover { opacity: 0.88; }
.btn-prev { background: #22242e; color: #c0c5dd; }
.btn-play { background: #34d399; color: #0f1117; }
.btn-next { background: #7c6af7; color: #fff; }
.counter { text-align: center; font-size: 12px; color: #5a5f7a; margin-top: 10px; font-family: Menlo, "Courier New", monospace; }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">한글 <span>韩语速记</span></div>

</div>

<div class="page" id="page-s">
  <div class="levels" id="slevels"></div>
  <div class="info" id="sinfo"></div>
  <div class="scard">
    <div class="scene" id="sscene"></div>
    <div class="skr" id="skr">—</div>
    <div class="sro" id="sro"></div>
    <div class="szh" id="szh"></div>
    <div class="breakdown" id="sbreakdown"></div>
    <div class="stip" id="stip"></div>
  </div>
  <div class="btns">
    <button class="btn btn-prev" onclick="sPrev()">&#8592; 上一句</button>
    <button class="btn btn-play" onclick="sPlay()">&#9654; 朗读</button>
    <button class="btn btn-next" onclick="sNext()">下一句 &#8594;</button>
  </div>
  <div class="counter" id="scounter"></div>
</div>

<script>

  var w = wPool[wIdx];

  document.getElementById('wzh').textContent = w.zh;

    var d = document.createElement('div');
    d.className = 'letter';
    var b = document.createElement('b');
    b.textContent = w.letters[i][0];
    var s = document.createElement('span');
    s.textContent = w.letters[i][1];
    d.appendChild(b);
    d.appendChild(s);
    lt.appendChild(d);
  }
  document.getElementById('wcounter').textContent = (wIdx + 1) + ' / ' + wPool.length + '  ·  Lv' + w.lv + ' ' + W_LV[w.lv];
  document.getElementById('winfo').textContent = '当前：' + (wLv === 0 ? '全部' : 'Lv' + wLv + ' ' + W_LV[wLv]) + ' · ' + wPool.length + '个单词';
}
function wNext() { if (!wPool.length) return; wIdx = (wIdx + 1) % wPool.length; wRender(); wPlay(); }
function wPrev() { if (!wPool.length) return; wIdx = (wIdx - 1 + wPool.length) % wPool.length; wRender(); wPlay(); }
function wPlay() {
  if (!wPool.length || !('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  var u = new SpeechSynthesisUtterance(wPool[wIdx].kr);
  u.lang = 'ko-KR'; u.rate = 0.85;
  window.speechSynthesis.speak(u);
}
function wSetLv(lv) {
  wLv = lv;
  document.querySelectorAll('#wlevels .lv').forEach(function(b) {
    b.className = 'lv' + (parseInt(b.dataset.lv) === lv ? ' on' : '');
  });
  wBuild(); wRender();
}

function sBuild() {
  sPool = sScene === "" ? SENTENCES.slice() : SENTENCES.filter(function(x) { return x.scene === sScene; });
  sIdx = 0;
}
function sRender() {
  if (!sPool.length) return;
  var s = sPool[sIdx];
  document.getElementById('sscene').textContent = '▸ ' + s.scene;
  document.getElementById('skr').textContent = s.kr;
  document.getElementById('sro').textContent = s.ro;
  document.getElementById('szh').textContent = s.zh;
  document.getElementById('stip').textContent = s.tip;
  var bd = document.getElementById('sbreakdown');
  bd.innerHTML = '';
  for (var i = 0; i < s.bd.length; i++) {
    var row = document.createElement('div');
    row.className = 'brow';
    var w1 = document.createElement('span'); w1.className = 'bword'; w1.textContent = s.bd[i][0];
    var w2 = document.createElement('span'); w2.className = 'brole'; w2.textContent = s.bd[i][1];
    var w3 = document.createElement('span'); w3.className = 'bdef'; w3.textContent = s.bd[i][2];
    row.appendChild(w1); row.appendChild(w2); row.appendChild(w3);
    bd.appendChild(row);
  }
  document.getElementById('scounter').textContent = (sIdx + 1) + ' / ' + sPool.length + '  ·  ' + s.scene;
  document.getElementById('sinfo').textContent = '场景：' + (sScene === "" ? '全部' : sScene) + ' · ' + sPool.length + '句';
}
function sNext() { if (!sPool.length) return; sIdx = (sIdx + 1) % sPool.length; sRender(); sPlay(); }
function sPrev() { if (!sPool.length) return; sIdx = (sIdx - 1 + sPool.length) % sPool.length; sRender(); sPlay(); }
function sPlay() {
  if (!sPool.length || !('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  var u = new SpeechSynthesisUtterance(sPool[sIdx].kr);
  u.lang = 'ko-KR'; u.rate = 0.8;
  window.speechSynthesis.speak(u);
}
function sSetScene(scene) {
  sScene = scene;
  document.querySelectorAll('#slevels .lv').forEach(function(b) {
    b.className = 'lv' + (b.dataset.scene === scene ? ' on' : '');
  });
  sBuild(); sRender();
}

function initLv(containerId, lvMap, setFn) {
  var box = document.getElementById(containerId);
  var list = [[0,'全部'],[1,'1·'+lvMap[1]],[2,'2·'+lvMap[2]],[3,'3·'+lvMap[3]],[4,'4·'+lvMap[4]],[5,'5·'+lvMap[5]]];
  for (var i = 0; i < list.length; i++) {
    (function(lv, name) {
      var b = document.createElement('div');
      b.className = 'lv' + (lv === 0 ? ' on' : '');
      b.textContent = name;
      b.dataset.lv = lv;
      b.onclick = function() { setFn(lv); };
      box.appendChild(b);
    })(list[i][0], list[i][1]);
  }
}
function initScene(containerId, scenes, setFn) {
  var box = document.getElementById(containerId);
  for (var i = 0; i < scenes.length; i++) {
    (function(scene) {
      var b = document.createElement('div');
      b.className = 'lv' + (scene === '全部' ? ' on' : '');
      b.textContent = scene;
      b.dataset.scene = scene === '全部' ? '' : scene;
      b.onclick = function() { setFn(scene === '全部' ? '' : scene); };
      box.appendChild(b);
    })(scenes[i]);
  }
}

document.addEventListener('keydown', function(e) {
  var onW = document.getElementById('page-w').className.indexOf('on') >= 0;
  if (e.key === 'ArrowRight' || e.key === 'f' || e.key === 'F') { onW ? wNext() : sNext(); }
  else if (e.key === 'ArrowLeft') { onW ? wPrev() : sPrev(); }
  else if (e.key === 'r' || e.key === 'R') { onW ? wPlay() : sPlay(); }
});

initLv('wlevels', W_LV, wSetLv);
initScene('slevels', S_SCENES, sSetScene);
wBuild(); wRender();
sBuild(); sRender();
</script>
</body>
</html>
